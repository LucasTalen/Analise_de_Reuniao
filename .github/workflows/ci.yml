name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate backend syntax
        run: python -m py_compile app.py
        env:
          SECRET_KEY: ci-placeholder-secret
          KEY_ENCRYPTION_MASTER_KEY: 3XN2eTRHdkxUOG5tNl85MjlWVVgwOF9ldWhsdkh3cTgtbE1WbnFaNzBNaz0=
          MONGODB_URI: mongodb://localhost:27017/ci

      - name: Run backend tests
        run: python -m pytest
        env:
          SECRET_KEY: ci-placeholder-secret
          KEY_ENCRYPTION_MASTER_KEY: 3XN2eTRHdkxUOG5tNl85MjlWVVgwOF9ldWhsdkh3cTgtbE1WbnFaNzBNaz0=
          MONGODB_URI: mongodb://localhost:27017/ci
